<style>
  :root{--navy:#1F3A5F;--gold:#B8902E;--gold-lt:#C9A24B;--cream:#FAF6EE;--ink:#22262B;}
  *{box-sizing:border-box;margin:0;}
  html,body{background:#000;}
  .stage{position:relative;width:1080px;height:1350px;overflow:hidden;background:#132640;}
  /* deep navy with a slow-moving warm blob */
  .blob{position:absolute;width:1500px;height:1500px;left:50%;top:50%;border-radius:50%;
    background:radial-gradient(circle, rgba(201,162,75,.42) 0%, rgba(201,162,75,.14) 34%, rgba(201,162,75,0) 60%);
    transform:translate(-50%,-50%);}
  .grain{position:absolute;inset:0;background:
    radial-gradient(120% 90% at 50% 110%, rgba(0,0,0,.32) 0%, rgba(0,0,0,0) 55%),
    radial-gradient(120% 90% at 50% -10%, rgba(0,0,0,.28) 0%, rgba(0,0,0,0) 50%);}
  .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:120px 96px;}
  .reference{font-family:"Inter",sans-serif;font-weight:700;letter-spacing:6px;font-size:22px;
    text-transform:uppercase;color:var(--gold-lt);margin-bottom:8px;will-change:opacity,transform;}
  .refrule{width:0;height:2px;background:var(--gold);margin:14px auto 46px;}
  .verse{font-family:"Playfair Display",serif;font-weight:600;color:#fff;}
  .vline{display:block;font-size:66px;line-height:1.24;margin:2px 0;will-change:opacity,transform;
    text-shadow:0 2px 30px rgba(0,0,0,.35);}
  .vline.key{color:var(--gold-lt);font-size:72px;position:relative;}
  .keyline{display:block;height:6px;background:var(--gold);border-radius:4px;margin:12px auto 4px;
    width:340px;transform:scaleX(0);}
  .sowhat{margin-top:52px;will-change:opacity,transform;}
  .sowhat .lbl{display:inline-block;margin-bottom:14px;font-family:"Inter",sans-serif;font-weight:700;
    letter-spacing:3px;font-size:15px;text-transform:uppercase;color:var(--navy);background:var(--gold-lt);
    padding:8px 20px;border-radius:22px;}
  .sowhat p{font-family:"Playfair Display",serif;font-style:italic;font-weight:500;font-size:34px;
    line-height:1.36;color:#f4ecda;max-width:760px;margin:0 auto;}
  .mark{position:absolute;left:0;right:0;bottom:74px;text-align:center;will-change:opacity,transform;}
  .mark .name{font-family:"Inter",sans-serif;font-weight:600;letter-spacing:3px;font-size:16px;
    text-transform:uppercase;color:var(--gold-lt);}
</style></head>
<body>
<div class="stage" id="stage">
  <div class="blob" id="blob"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="reference" id="reference">Mark 11:24</div>
    <div class="refrule" id="refrule"></div>
    <div class="verse">
      <span class="vline" id="v0">Whatever you ask</span>
      <span class="vline" id="v1">for in prayer,</span>
      <span class="vline key" id="v2">believe you<br>have received it</span>
      <span class="keyline" id="keyline"></span>
      <span class="vline" id="v3">and it will be yours.</span>
    </div>
    <div class="sowhat" id="sowhat">
      <span class="lbl">So what — today?</span>
      <p>Pray for the one thing you keep hedging on. Then live like He heard you.</p>
    </div>
  </div>
  <div class="mark" id="mark"><div class="name">The Daily Walk Newsletter</div></div>
</div>
<script>
  const clamp=(x)=>x<0?0:x>1?1:x;
  const prog=(t,s,d)=>clamp((t-s)/d);
  const eo=(t)=>1-Math.pow(1-t,3);
  const back=(t)=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);};
  const $=(id)=>document.getElementById(id);
  function rise(el,p,dist){const e=back(clamp(p));el.style.opacity=clamp(p/0.4);el.style.transform=`translateY(${((1-e)*(dist||70)).toFixed(1)}px)`;}
  function pop(el,p){const e=back(clamp(p));el.style.opacity=clamp(p/0.35);el.style.transform=`scale(${(0.6+0.4*e).toFixed(3)})`;}
  window.DURATION=6.6;
  window.seek=function(t){
    // background blob drifts + breathes
    const bx=-50+6*Math.sin(t*0.5), by=-50+5*Math.cos(t*0.42), bs=1+0.05*Math.sin(t*0.6);
    $("blob").style.transform=`translate(${bx}%,${by}%) scale(${bs.toFixed(3)})`;
    $("blob").style.opacity=(0.5+0.5*eo(prog(t,0,1.5))).toFixed(3);
    pop($("reference"),prog(t,0.25,0.6));
    $("refrule").style.width=(70*eo(prog(t,0.7,0.6))).toFixed(0)+"px";
    rise($("v0"),prog(t,1.0,0.55),60);
    rise($("v1"),prog(t,1.35,0.55),60);
    pop($("v2"),prog(t,1.85,0.6));
    $("keyline").style.transform=`scaleX(${eo(prog(t,2.5,0.5)).toFixed(3)})`;
    rise($("v3"),prog(t,2.95,0.55),60);
    rise($("sowhat"),prog(t,3.9,0.7),46);
    rise($("mark"),prog(t,4.6,0.7),30);
  };
  window.seek(0);
</script>
</body></html>
