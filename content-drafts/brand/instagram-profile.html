<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@600;700&display=swap" rel="stylesheet"/>
<style>
 html,body{margin:0}
 .card{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:'Inter',Arial,sans-serif;
   background:radial-gradient(70% 62% at 50% 66%, #f6cf86 0%, #d99a4f 12%, #9a6a44 26%, #3f4a63 48%, #24406a 68%, #17304f 100%);}
 .rays{position:absolute;inset:0;background:repeating-conic-gradient(from 0deg at 50% 66%,
   rgba(249,207,134,0) 0deg, rgba(249,207,134,0.18) 2.2deg, rgba(249,207,134,0) 4.6deg, rgba(249,207,134,0) 8deg);
   -webkit-mask-image:radial-gradient(60% 60% at 50% 66%, #000 0%, rgba(0,0,0,.5) 45%, transparent 72%);
   mask-image:radial-gradient(60% 60% at 50% 66%, #000 0%, rgba(0,0,0,.5) 45%, transparent 72%);}
 .ring{position:absolute;inset:66px;border:3px solid rgba(201,162,75,0.55);border-radius:50%;}
 .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 150px;}
 .wm1{font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:112px;line-height:0.96;color:#FAF6EE;letter-spacing:1px;margin-top:-30px;}
 .wm2{font-weight:700;font-size:40px;letter-spacing:19px;color:#E3C074;margin:18px 0 0;padding-left:19px;}
 .sun{width:120px;height:60px;border-radius:120px 120px 0 0;background:linear-gradient(#ffe9b8,#e7b45f);margin-bottom:26px;box-shadow:0 0 60px 20px rgba(255,220,150,.45);}
</style></head><body><div class="card"><div class="rays"></div><div class="ring"></div>
 <div class="c"><div class="sun"></div><div class="wm1">The Daily Walk</div><div class="wm2">NEWSLETTER</div></div>
</div></body></html>
