<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
 html,body{margin:0}
 .card{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:'Inter',Arial,sans-serif;
   background:linear-gradient(180deg, rgba(15,26,46,.86) 0%, rgba(17,32,56,.46) 50%, rgba(31,58,95,.55) 100%),
     radial-gradient(120% 80% at 50% 120%, #f6cf86 0%, #e3a85a 15%, #b9763f 30%, #5b4f63 52%, #243a5d 74%, #17304f 100%);}
 .rays{position:absolute;inset:0;background:repeating-conic-gradient(from 0deg at 50% 118%,
   rgba(249,207,134,0) 0deg, rgba(249,207,134,0.22) 2.2deg, rgba(249,207,134,0) 4.6deg, rgba(249,207,134,0) 8deg);
   -webkit-mask-image:radial-gradient(74% 84% at 50% 118%, #000 0%, rgba(0,0,0,.55) 42%, transparent 74%);
   mask-image:radial-gradient(74% 84% at 50% 118%, #000 0%, rgba(0,0,0,.55) 42%, transparent 74%);}
 .glow{position:absolute;left:50%;bottom:-10%;transform:translateX(-50%);width:960px;height:560px;
   background:radial-gradient(50% 60% at 50% 100%, rgba(255,223,160,.5), transparent 70%);}
 .frame{position:absolute;top:42px;left:42px;right:42px;bottom:42px;border:2px solid rgba(201,162,75,.55);border-radius:28px;}
 .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 100px;}
 .eyebrow{letter-spacing:6px;font-size:20px;font-weight:700;color:#E3C074;text-transform:uppercase;margin-bottom:24px;}
 .wm1{font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:104px;line-height:.98;color:#FAF6EE;letter-spacing:1px;}
 .wm2{font-weight:700;font-size:40px;letter-spacing:19px;color:#C9A24B;margin:14px 0 0;padding-left:19px;}
 .rule{width:72px;height:3px;background:#C9A24B;margin:40px auto 32px;border-radius:2px;}
 .verse{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:44px;line-height:1.32;color:#F1E7C6;max-width:800px;}
 .ref{font-size:24px;letter-spacing:2px;color:#E3C074;margin-top:24px;font-weight:600;}
 .dom{position:absolute;bottom:78px;left:0;right:0;text-align:center;letter-spacing:2px;font-size:22px;color:#AFC0D6;}
</style></head><body><div class="card"><div class="rays"></div><div class="glow"></div><div class="frame"></div>
 <div class="c"><div class="eyebrow">The Daily Walk Newsletter</div>
 <div class="verse">&ldquo;Your word is a lamp to my feet and a light to my path.&rdquo;</div>
 <div class="ref">— PSALM 119:105</div></div>
 <div class="dom">thedailywalknewsletter.com</div></div></body></html>
