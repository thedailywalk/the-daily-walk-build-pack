<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; }
  .card {
    width: 1080px; height: 1080px; position: relative; overflow: hidden;
    font-family: 'Inter', Arial, sans-serif;
    background:
      linear-gradient(180deg, rgba(15,26,46,0.86) 0%, rgba(17,32,56,0.46) 50%, rgba(31,58,95,0.55) 100%),
      radial-gradient(120% 80% at 50% 120%, #f6cf86 0%, #e3a85a 15%, #b9763f 30%, #5b4f63 52%, #243a5d 74%, #17304f 100%);
  }
  .rays {
    position: absolute; inset: 0;
    background: repeating-conic-gradient(from 0deg at 50% 118%,
      rgba(249,207,134,0) 0deg, rgba(249,207,134,0.22) 2.2deg,
      rgba(249,207,134,0) 4.6deg, rgba(249,207,134,0) 8deg);
    -webkit-mask-image: radial-gradient(74% 84% at 50% 118%, #000 0%, rgba(0,0,0,0.55) 42%, transparent 74%);
    mask-image: radial-gradient(74% 84% at 50% 118%, #000 0%, rgba(0,0,0,0.55) 42%, transparent 74%);
  }
  .glow {
    position: absolute; left: 50%; bottom: -10%; transform: translateX(-50%);
    width: 960px; height: 560px;
    background: radial-gradient(50% 60% at 50% 100%, rgba(255,223,160,0.55), transparent 70%);
  }
  .frame {
    position: absolute; top: 42px; left: 42px; right: 42px; bottom: 42px;
    border: 2px solid rgba(201,162,75,0.55); border-radius: 28px;
  }
  .content {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 0 90px;
  }
  .eyebrow {
    letter-spacing: 7px; font-size: 22px; font-weight: 700; color: #E3C074;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .rule { width: 72px; height: 3px; background: #C9A24B; margin: 0 auto 36px; border-radius: 2px; }
  .wm1 {
    font-family: 'Playfair Display', Georgia, serif; font-weight: 800;
    font-size: 122px; line-height: 0.98; color: #FAF6EE; letter-spacing: 1px;
  }
  .wm2 {
    font-weight: 700; font-size: 46px; letter-spacing: 22px; color: #C9A24B;
    margin: 16px 0 0 0; padding-left: 22px;
  }
  .tag {
    font-family: 'Playfair Display', Georgia, serif; font-style: italic;
    font-size: 41px; color: #E9DCB8; margin-top: 42px;
  }
  .dom {
    position: absolute; bottom: 80px; left: 0; right: 0; text-align: center;
    letter-spacing: 2px; font-size: 22px; color: #AFC0D6;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="rays"></div>
    <div class="glow"></div>
    <div class="frame"></div>
    <div class="content">
      <div class="eyebrow">A Daily Christian Devotional</div>
      <div class="rule"></div>
      <div class="wm1">The Daily Walk</div>
      <div class="wm2">NEWSLETTER</div>
      <div class="tag">Walking with God in real life</div>
    </div>
    <div class="dom">thedailywalknewsletter.com</div>
  </div>
</body>
</html>
